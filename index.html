<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Landencyklopedi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Landencyklopedi</h1>

    <section class="search-section">
      <label for="searchInput">Sök efter land</label>
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Skriv t.ex. Sweden, Japan...">
        <button id="searchBtn">Sök</button>
      </div>
      <p class="hint">Tip: Senaste sökning: <span id="lastSearchLabel">–</span></p>
    </section>

    <section class="controls">
      <div class="regions">
        <h2>Världsdelar</h2>
        <div class="region-buttons" id="regions">
          <button data-region="europe">Europa</button>
          <button data-region="asia">Asien</button>
          <button data-region="africa">Afrika</button>
          <button data-region="americas">Americas</button>
          <button data-region="oceania">Oceanien</button>
        </div>
      </div>

      <div class="extra-filters">
        <h2>Extra funktioner</h2>
        <button id="sortByNameBtn">Sortera länder (A–Ö)</button>
      </div>
    </section>

    <div id="loading" class="info hidden">Laddar data...</div>
    <div id="error" class="info error hidden"></div>

    <section class="country-section">
      <h2>Valt land</h2>
      <div id="countryContainer" class="country-details empty-state">
        <p>Inget land valt ännu. Sök efter ett land eller välj en världsdel.</p>
      </div>
    </section>

    <section class="region-section">
      <h2>Länder i vald världsdel</h2>
      <div id="regionList" class="region-list">
        <!-- Länder från region visas här -->
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
